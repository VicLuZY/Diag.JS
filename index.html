<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diag.JS</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #111827;
        color: #f9fafb;
      }

      main {
        text-align: center;
        padding: 2rem;
      }

      h1 {
        font-size: clamp(2rem, 6vw, 3rem);
        margin: 0 0 0.5rem;
      }

      p {
        font-size: clamp(1rem, 3vw, 1.25rem);
        margin: 0;
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Diag.JS</h1>
      <p>This homepage is under development.</p>
    </main>
  </body>
</html>
