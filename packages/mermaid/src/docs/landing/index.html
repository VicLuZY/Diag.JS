<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inkline Docs</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;600;700&display=swap');

      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem 1rem;
        font-family: 'Space Grotesk', 'Segoe UI', sans-serif;
        background:
          radial-gradient(circle at 12% 8%, rgba(15, 118, 110, 0.16), transparent 30%),
          radial-gradient(circle at 95% 4%, rgba(14, 165, 233, 0.16), transparent 26%),
          linear-gradient(180deg, #f8fafc 0%, #ecfeff 100%);
        color: #0f172a;
      }

      main {
        width: min(780px, 100%);
        border: 1px solid rgba(15, 118, 110, 0.28);
        border-radius: 24px;
        padding: clamp(1.4rem, 2.8vw, 2.2rem);
        background:
          linear-gradient(155deg, rgba(255, 255, 255, 0.95), rgba(240, 253, 250, 0.88)),
          radial-gradient(circle at 20% 10%, rgba(56, 189, 248, 0.14), transparent 40%);
        box-shadow: 0 26px 70px rgba(2, 6, 23, 0.14);
      }

      h1 {
        margin: 0 0 0.8rem;
        line-height: 1;
        font-size: clamp(2rem, 5vw, 3.4rem);
        letter-spacing: -0.04em;
      }

      p {
        margin: 0 0 1rem;
        max-width: 58ch;
        line-height: 1.6;
      }

      .eyebrow {
        display: inline-block;
        margin-bottom: 1rem;
        padding: 0.25rem 0.7rem;
        border-radius: 999px;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.78rem;
        background: rgba(15, 118, 110, 0.14);
        color: #115e59;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.8rem;
        margin-top: 1.4rem;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        font-weight: 600;
        border-radius: 999px;
        padding: 0.68rem 1.05rem;
      }

      .primary {
        background: #0f766e;
        color: #ffffff;
      }

      .primary:hover {
        background: #115e59;
      }

      .secondary {
        border: 1px solid rgba(15, 118, 110, 0.4);
        color: #134e4a;
      }

      .secondary:hover {
        border-color: rgba(15, 118, 110, 0.7);
        background: rgba(15, 118, 110, 0.05);
      }

      @media (max-width: 640px) {
        main {
          border-radius: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <span class="eyebrow">Diagram-as-code docs</span>
      <h1>Inkline</h1>
      <p>
        Write architecture and workflow diagrams as plain text, version them with your codebase,
        and render clean visuals in documentation.
      </p>
      <div class="actions">
        <a class="primary" href="/intro/">Open documentation</a>
        <a class="secondary" href="/syntax/sld">View syntax</a>
      </div>
    </main>
  </body>
</html>
